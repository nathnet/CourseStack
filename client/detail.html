<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CourseStack</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/scripts/navbar.js"></script>
    <script type="module" src="/scripts/detail.js"></script>
  </head>
  <body>
    <nav id="navbar" class="container"></nav>
    <main class="container">
      <a href="/">← Back to courses</a>
      <article id="course-detail">
        <aside id="course-sidebar">
          <img id="course-image" src="" alt="" />
          <a id="course-url" href="" target="_blank" rel="noopener noreferrer" role="button">
            Go to Course ↗
          </a>
        </aside>
        <div id="course-content">
          <hgroup>
            <h1 id="course-title"></h1>
            <p id="course-provider"></p>
          </hgroup>
          <p id="course-description"></p>
          <div id="course-meta">
            <strong>Skill Level</strong><span id="course-level"></span>
            <strong>Topics</strong><span id="course-topics"></span>
            <strong>Languages</strong><span id="course-languages"></span>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
