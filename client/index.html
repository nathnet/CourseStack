<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CourseStack</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.0.6/css/pico.min.css"
      integrity="sha384-7P0NVe9LPDbUCAF+fH2R8Egwz1uqNH83Ns/bfJY0fN2XCDBMUI2S9gGzIOIRBKsA"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/scripts/navbar.js"></script>
    <script type="module" src="/scripts/index.js"></script>
  </head>
  <body>
    <nav id="navbar" class="container"></nav>
    <main class="container">
      <header>
        <h1>CourseStack</h1>
        <p>A curated list of courses worth your time.</p>
      </header>
      <form id="filters" role="search">
        <div class="grid">
          <select id="filter-provider" aria-label="Provider">
            <option value="">All Providers</option>
          </select>
          <select id="filter-skill-level" aria-label="Skill Level">
            <option value="">All Levels</option>
          </select>
          <select id="filter-topic" aria-label="Topic">
            <option value="">All Topics</option>
          </select>
          <select id="filter-language" aria-label="Language">
            <option value="">All Languages</option>
          </select>
        </div>
      </form>
      <section id="course-list" aria-label="Course list"></section>
    </main>
  </body>
</html>
